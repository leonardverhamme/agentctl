name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    # The reusable workflow below includes these automation-core gates:
    # Install automation-core dependencies
    # Typecheck automation-core
    # Build automation-core
    # Run automation-core tests
    # Smoke automation-core health check against Postgres
    uses: ./.github/workflows/verify.yml
