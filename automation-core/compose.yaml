services:
  automation-core:
    build:
      context: .
    init: true
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-4313}:3010"
    env_file:
      - path: ./.env
        required: false
    environment:
      SQLITE_PATH: /data/automation-core.sqlite
      APP_HOST: 0.0.0.0
      APP_PORT: 3010
    volumes:
      - ./.data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3010/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
